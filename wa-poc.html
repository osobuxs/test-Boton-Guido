<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>POC WhatsApp Embedded Signup</title>
  <style>
    body { font-family: system-ui; margin: 0; padding: 18px; background: #0b1020; color: #eaf0ff }
    .card { max-width: 920px; background: #111a33; border: 1px solid rgba(255, 255, 255, .1); border-radius: 12px; padding: 14px }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px }
    label { display: block; font-size: 12px; color: #8ea0c8; margin: 8px 0 6px }
    input { width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid rgba(255, 255, 255, .12); background: rgba(255, 255, 255, .03); color: #eaf0ff; padding: 10px }
    button { border: 0; border-radius: 10px; padding: 10px 12px; cursor: pointer; background: #1877f2; color: #fff; font-weight: 800 }
    button.secondary { background: rgba(255, 255, 255, .12) }
    button:disabled { opacity: .45; cursor: not-allowed }
    pre { background: rgba(0, 0, 0, .25); border: 1px solid rgba(255, 255, 255, .1); border-radius: 12px; padding: 12px; overflow: auto }
    .muted { color: #8ea0c8 }
    hr { border: 0; border-top: 1px solid rgba(255, 255, 255, .12); margin: 14px 0 }
  </style>
</head>

<body>
  <div class="card">
    <h2>POC - Conectar WhatsApp (Embedded Signup)</h2>
    <p class="muted">1) Pedís config al backend. 2) Recién ahí se habilita el botón para abrir Meta.</p>

    <div class="row">
      <div>
        <label>API Base (tu backend oauth)</label>
        <input id="apiBase" value="https://11jx77f9-4032.brs.devtunnels.ms/hi-WhatsApp-Api-test">
      </div>
      <div>
        <label>Estado</label>
        <input id="status" value="—" disabled>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Token Backoffice (Authorization: Bearer ...)</label>
        <input id="boBearer" placeholder="token de sesión backoffice (si aplica)">
      </div>
      <div>
        <label>return_to</label>
        <input id="returnTo" value="/integrations">
      </div>
    </div>

    <hr>

    <h3>Datos de Empresa</h3>
    <div class="row">
      <div>
        <label>company_token (JWT empresa)</label>
        <input id="company_token" placeholder="Pegá el company_token...">
      </div>
      <div>
        <label>state (generado por backend)</label>
        <input id="state" disabled>
      </div>
    </div>

    <div class="row">
      <div>
        <label>dialog_url (devuelto por backend)</label>
        <input id="dialog_url" disabled>
      </div>
      <div>
        <label>bridge_url (devuelto por backend)</label>
        <input id="bridge_url" disabled>
      </div>
    </div>

    <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
      <button id="btnGetConfig">1) Obtener botón (config)</button>
      <button id="btnOpenMeta" disabled>2) Abrir Meta (popup)</button>
      <button class="secondary" id="btnClear">Borrar localStorage</button>
    </div>

    <hr>

    <h3>Resultado</h3>
    <div class="row">
      <div><label>integration.uuid</label><input id="integration_uuid" disabled></div>
      <div><label>integration.status</label><input id="integration_status" disabled></div>
    </div>

    <div class="row">
      <div><label>phone_number_id</label><input id="phone_number_id" disabled></div>
      <div><label>number</label><input id="number" disabled></div>
    </div>

    <div class="row">
      <div><label>waba_id</label><input id="waba_id" disabled></div>
      <div><label>business_id</label><input id="business_id" disabled></div>
    </div>

    <div class="row">
      <div><label>stage</label><input id="stage" disabled></div>
      <div><label>message</label><input id="message" disabled></div>
    </div>

    <h3 style="margin-top:16px;">Debug</h3>
    <pre id="log"></pre>
  </div>

  <script>
    (function () {
      const $ = (id) => document.getElementById(id);
      const LS_KEY = "wa_poc_flow_v2";

      let lastConfig = null;

      const LOG = (msg, obj) => {
        const line = `[${new Date().toISOString()}] ${msg}` + (obj ? "\n" + JSON.stringify(obj, null, 2) : "");
        $("log").textContent += ($("log").textContent ? "\n\n" : "") + line;
      };

      const setStatus = (text, ok = null) => {
        $("status").value = text;
        $("status").style.color = ok === true ? "#1ee3a8" : ok === false ? "#ff5c7a" : "#eaf0ff";
      };

      function openCenteredPopup(url, w, h) {
        const dualScreenLeft = window.screenLeft !== undefined ? window.screenLeft : window.screenX;
        const dualScreenTop = window.screenTop !== undefined ? window.screenTop : window.screenY;
        const width = window.innerWidth ? window.innerWidth : document.documentElement.clientWidth;
        const height = window.innerHeight ? window.innerHeight : document.documentElement.clientHeight;
        const left = ((width / 2) - (w / 2)) + dualScreenLeft;
        const top = ((height / 2) - (h / 2)) + dualScreenTop;
        const features = `scrollbars=yes,width=${w},height=${h},top=${top},left=${left}`;
        return window.open(url, "wa_meta_oauth", features);
      }

      function clearResultUI() {
        $("integration_uuid").value = "";
        $("integration_status").value = "";
        $("phone_number_id").value = "";
        $("number").value = "";
        $("waba_id").value = "";
        $("business_id").value = "";
        $("stage").value = "";
        $("message").value = "";
      }

      function fillResultUI(result) {
        const r = result || {};
        const integ = r.integration || {};

        $("integration_uuid").value = integ.uuid || "";
        $("integration_status").value = integ.status || "";

        $("phone_number_id").value = integ.phone_number_id || r.phone_number_id || "";
        $("number").value = integ.number || r.number || "";

        $("waba_id").value = integ.waba_id || r.waba_id || "";
        $("business_id").value = integ.business_id || r.business_id || "";

        $("stage").value = r.stage || "";
        $("message").value = r.message || "";

        if (integ.status === "ACTIVO") setStatus("✅ Integración ACTIVA", true);
        else if (integ.status) setStatus("⚠️ Integración: " + integ.status, false);
        else if (r.stage || r.message) setStatus("⚠️ Flujo completó con aviso", false);
      }

      function fillConfigUI(cfg) {
        $("state").value = cfg?.state || "";
        $("dialog_url").value = cfg?.dialog_url || "";
        $("bridge_url").value = cfg?.bridge_url || "";
      }

      function setMetaButtonEnabled(enabled) {
        $("btnOpenMeta").disabled = !enabled;
      }

      async function postConfig() {
        const apiBase = $("apiBase").value.trim().replace(/\/$/, "");
        const url = apiBase + "/backoffice/whatsapp/signup/config";

        const companyToken = $("company_token").value.trim();
        if (!companyToken) throw new Error("Falta company_token");

        const body = {
          company_token: companyToken,
          return_to: $("returnTo").value.trim() || "/integrations"
        };

        const boBearer = $("boBearer").value.trim();

        LOG("➡️ POST config", { url, body, hasAuth: !!boBearer });

        const r = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            ...(boBearer ? { "Authorization": "Bearer " + boBearer } : {})
          },
          body: JSON.stringify(body)
        });

        const txt = await r.text();
        let j;
        try { j = txt ? JSON.parse(txt) : null; }
        catch { j = { raw: txt }; }

        if (!r.ok) throw new Error(`Error POST config (${r.status}): ${JSON.stringify(j)}`);
        if (!j?.dialog_url || !j?.state) throw new Error("El backend no devolvió dialog_url/state");

        return j;
      }

      // El bridge debería mandar:
      // { type:"HICHAT_WA_OAUTH_RESULT", ok:true/false, state, result }
      window.addEventListener("message", (event) => {
        const data = event.data;
        if (!data || data.type !== "HICHAT_WA_OAUTH_RESULT") return;

        LOG("📩 postMessage recibido", data);

        clearResultUI();

        if (!data.ok) {
          setStatus("❌ OAuth falló", false);
          $("stage").value = data.stage || "unknown";
          $("message").value = data.message || "Falló el flujo OAuth (ver debug).";
          return;
        }

        const result = data.result || {};
        fillResultUI(result);

        try {
          localStorage.setItem(LS_KEY, JSON.stringify({ config: lastConfig, result, createdAt: Date.now() }));
        } catch { }
      });

      $("btnGetConfig").addEventListener("click", async () => {
        try {
          setStatus("Pidiendo config…", null);
          clearResultUI();
          setMetaButtonEnabled(false);

          const cfg = await postConfig();
          lastConfig = cfg;

          fillConfigUI(cfg);
          setMetaButtonEnabled(true);

          LOG("✅ Config obtenida", cfg);
          setStatus("✅ Config lista. Ya podés abrir Meta.", true);

          try {
            localStorage.setItem(LS_KEY, JSON.stringify({ config: cfg, createdAt: Date.now() }));
          } catch { }
        } catch (e) {
          LOG("❌ Error obteniendo config", { error: String(e) });
          setStatus("❌ Error obteniendo config", false);
          fillConfigUI(null);
          setMetaButtonEnabled(false);
        }
      });

      $("btnOpenMeta").addEventListener("click", async () => {
        try {
          if (!lastConfig?.dialog_url) {
            setStatus("⚠️ Primero obtené la config", false);
            return;
          }

          LOG("➡️ OPEN popup dialog", {
            dialogUrl: lastConfig.dialog_url,
            bridge_url_expected: lastConfig.bridge_url,
            state: lastConfig.state
          });

          const pop = openCenteredPopup(lastConfig.dialog_url, lastConfig.popup?.width || 520, lastConfig.popup?.height || 720);
          if (!pop) {
            setStatus("⚠️ Popup bloqueado (habilitá popups)", false);
            return;
          }

          setStatus("Esperando autorización…", null);
        } catch (e) {
          LOG("❌ Error abriendo popup", { error: String(e) });
          setStatus("❌ Error abriendo popup", false);
        }
      });

      $("btnClear").addEventListener("click", () => {
        localStorage.removeItem(LS_KEY);
        lastConfig = null;

        fillConfigUI(null);
        clearResultUI();
        setMetaButtonEnabled(false);

        setStatus("🧹 localStorage borrado", null);
        LOG("🧹 localStorage borrado");
      });

      // restaurar si hay datos guardados
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);

          if (parsed?.config?.dialog_url) {
            lastConfig = parsed.config;
            fillConfigUI(lastConfig);
            setMetaButtonEnabled(true);
            setStatus("✅ Config recuperada. Ya podés abrir Meta.", true);
            LOG("🔁 Config recuperada de localStorage", lastConfig);
          }

          if (parsed?.result) {
            fillResultUI(parsed.result);
            LOG("🔁 Resultado recuperado de localStorage", parsed.result);
          }
        }
      } catch (e) {
        LOG("⚠️ Error leyendo localStorage", { error: String(e) });
      }
    })();
  </script>
</body>

</html>
