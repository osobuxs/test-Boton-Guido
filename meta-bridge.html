<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meta Bridge</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 18px;
      background: #ffffff;
      color: #111;
    }

    .box {
      max-width: 900px;
      margin: 0 auto;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .muted {
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Conectando Meta…</h2>
    <p class="muted">Esperando confirmación del backend.</p>
    <pre id="log"></pre>
  </div>

  <script>
    (function () {
      const logEl = document.getElementById("log");

      function log(msg, obj) {
        const line = msg + (obj ? "\n" + JSON.stringify(obj, null, 2) : "");
        logEl.textContent += (logEl.textContent ? "\n\n" : "") + line;
      }

      const qs = new URLSearchParams(location.search);
      const state = qs.get("state") || "";
      const returnToRaw = qs.get("return_to") || "/integrations";
      const apiBase = qs.get("api_base") || "";

      function normalizeReturnTo(v) {
        if (!v) return "/integrations";
        if (/^https?:\/\//i.test(v)) return v;
        if (v.startsWith("/")) return v;
        return "/" + v;
      }

      const returnTo = normalizeReturnTo(decodeURIComponent(returnToRaw));

      const pollUrl = apiBase
        ? apiBase.replace(/\/$/, "") + "/meta/oauth/poll?state=" + encodeURIComponent(state)
        : null;

      log("state=" + state);
      log("return_to=" + returnTo);
      log("pollUrl=" + (pollUrl || "(sin api_base)"));

      if (!state) {
        log("❌ Missing state");
        return;
      }

      if (!pollUrl) {
        log("❌ No puedo hacer poll sin api_base");
        return;
      }

      const start = Date.now();
      const TIMEOUT_MS = 60000;
      const INTERVAL_MS = 1000;

      async function poll() {
        try {
          const response = await fetch(pollUrl, { method: "GET" });
          const txt = await response.text();

          let json;
          try {
            json = txt ? JSON.parse(txt) : null;
          } catch {
            json = { raw: txt };
          }

          if (!response.ok) {
            log("❌ Poll error HTTP " + response.status, json);
            return null;
          }

          return json;
        } catch (e) {
          log("❌ Poll exception", { error: String(e) });
          return null;
        }
      }

      function computeOk(result) {
        const integrations = result?.integrations;
        if (integrations?.facebook?.uuid || integrations?.instagram?.uuid) {
          return true;
        }

        if (result?.stage === "exchange") return false;
        if (result?.error) return false;

        return false;
      }

      async function loop() {
        const elapsed = Date.now() - start;
        if (elapsed > TIMEOUT_MS) {
          log("⏱️ Timeout esperando resultado. Reintentá el flujo.");

          try {
            window.opener?.postMessage({
              type: "HICHAT_META_OAUTH_RESULT",
              state,
              ok: false,
              stage: "timeout",
              message: "Timeout esperando resultado del backend.",
              result: null
            }, "*");
          } catch {}

          return;
        }

        const data = await poll();

        if (!data || !data.ready) {
          log("Aún no está listo. Reintentando…");
          setTimeout(loop, INTERVAL_MS);
          return;
        }

        const result = data.result || {};
        const ok = computeOk(result);

        log("✅ Resultado recibido", { ok, result });

        try {
          window.opener?.postMessage({
            type: "HICHAT_META_OAUTH_RESULT",
            state,
            ok,
            result,
            stage: result?.stage,
            message: result?.message
          }, "*");
        } catch (e) {
          log("⚠️ postMessage falló", { error: String(e) });
        }

        try {
          if (returnTo) {
            location.replace(returnTo);
          }
        } catch (e) {
          log("⚠️ redirect falló", { error: String(e), returnTo });
        }
      }

      loop();
    })();
  </script>
</body>
</html>
